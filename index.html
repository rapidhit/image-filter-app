<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Photo Filter Tool</title>

<style>
body{
font-family: Arial;
background:#f3f3f3;
text-align:center;
padding:40px;
}

h1{
margin-bottom:20px;
}

.container{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
margin-top:30px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
}

img{
max-width:300px;
border-radius:10px;
}

button{
margin-top:10px;
padding:8px 15px;
border:none;
background:black;
color:white;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>AI Photo Filters</h1>

<input type="file" id="upload">

<div class="container">

<div class="card">
<h3>Black & White</h3>
<img id="bw">
</div>

<div class="card">
<h3>Warm Natural</h3>
<img id="warm">
</div>

<div class="card">
<h3>Teal Cinematic</h3>
<img id="teal">
</div>

</div>

<script>

const upload = document.getElementById("upload");

upload.addEventListener("change", function(){

const file = this.files[0];
const url = URL.createObjectURL(file);

document.getElementById("bw").src = url;
document.getElementById("warm").src = url;
document.getElementById("teal").src = url;

document.getElementById("bw").style.filter =
"grayscale(100%) contrast(90%) brightness(95%)";

document.getElementById("warm").style.filter =
"saturate(115%) brightness(105%) contrast(108%) sepia(10%)";

document.getElementById("teal").style.filter =
"saturate(110%) contrast(115%) hue-rotate(160deg)";

});

</script>

</body>
</html>
