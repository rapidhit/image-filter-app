<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro AI Photo Filter App</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #f3f3f3;
  text-align: center;
  margin: 0;
  padding: 40px;
}h1 { margin-bottom: 20px; }

.container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 30px; }

.card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; align-items: center; }

img { max-width: 300px; border-radius: 12px; margin-top: 10px; box-shadow: 0 3px 10px rgba(0,0,0,0.1); }

button { margin-top: 12px; padding: 10px 18px; border: none; background: #111; color: #fff; border-radius: 8px; cursor: pointer; font-weight: bold; }

button:hover { background: #333; } </style>

</head>
<body><h1>Pro AI Photo Filter App</h1>
<input type="file" id="upload">
<div class="container">
  <div class="card">
    <h3>Black & White</h3>
    <canvas id="bwCanvas"></canvas>
    <button onclick="downloadFilter('bw')">Download</button>
  </div>
  <div class="card">
    <h3>Warm Natural</h3>
    <canvas id="warmCanvas"></canvas>
    <button onclick="downloadFilter('warm')">Download</button>
  </div>
  <div class="card">
    <h3>Teal Cinematic</h3>
    <canvas id="tealCanvas"></canvas>
    <button onclick="downloadFilter('teal')">Download</button>
  </div>
</div><script>
const upload = document.getElementById('upload');
let originalImage = new Image();

upload.addEventListener('change', function(){
  const file = this.files[0];
  if(!file) return;
  const url = URL.createObjectURL(file);
  originalImage.src = url;
});

originalImage.onload = function(){
  applyFilters();
}

function applyFilters(){
  const filters = {
    bw: 'grayscale(100%) contrast(90%) brightness(95%)',
    warm: 'saturate(115%) brightness(105%) contrast(108%) sepia(10%)',
    teal: 'saturate(110%) contrast(115%) hue-rotate(160deg)'
  };

  for(const key in filters){
    const canvas = document.getElementById(key + 'Canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = originalImage.width;
    canvas.height = originalImage.height;
    ctx.filter = filters[key];
    ctx.drawImage(originalImage, 0, 0);
  }
}

function downloadFilter(type){
  const canvas = document.getElementById(type + 'Canvas');
  const link = document.createElement('a');
  link.download = type + '-filter.png';
  link.href = canvas.toDataURL();
  link.click();
}
</script></body>
</html>
